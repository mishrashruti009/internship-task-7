<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
</head>

<body>

<div class="container">

  <div class="top">

  </div>

<script type="module" src="/src/main.js"></script>

</html>
